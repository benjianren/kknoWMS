    // 简单的趋势图表组件
    function SimpleChart({ data, color, labels }) {
      const canvasRef = useRef(null);
      
      useEffect(() => {
        if (!canvasRef.current) return;
        
        const ctx = canvasRef.current.getContext('2d');
        const width = canvasRef.current.width = canvasRef.current.offsetWidth;
        const height = canvasRef.current.height = canvasRef.current.offsetHeight;
        
        // 清空画布
        ctx.clearRect(0, 0, width, height);
        
        // 绘制折线
        const max = Math.max(...data);
        const min = Math.min(...data);
        const range = max - min || 1;
        
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        
        data.forEach((val, i) => {
          const x = (i / (data.length - 1)) * (width - 40) + 20;
          const y = height - 30 - ((val - min) / range) * (height - 50);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
        
        // 绘制填充
        ctx.lineTo(width - 20, height - 30);
        ctx.lineTo(20, height - 30);
        ctx.closePath();
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, color + '40');
        gradient.addColorStop(1, color + '00');
        ctx.fillStyle = gradient;
        ctx.fill();
        
      }, [data, color]);
      
      return <canvas ref={canvasRef} className="w-full h-full" />;
    }

    function App() {
      const [period, setPeriod] = useState('30d');
      const [filters, setFilters] = useState({

                {value}{unit}
              </div>
              <div className="flex items-center gap-2 mt-2">
                <span className={`trend-badge ${change > 0 ? 'trend-up' : 'trend-down'}`}>

                  {Math.abs(change)}{unit === '%' ? '%' : ''}

            </div>

        </div>

                  </div>
                </div>
                <div className="flex items-center gap-3">

                    <i className="fas fa-sync-alt mr-2"></i>刷新
                  </button>
                  <button className="px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">
                    <i className="fas fa-download mr-2"></i>导出分析
                  </button>
                  <button className="px-4 py-2 text-sm text-primary bg-primary-light rounded-lg hover:bg-[#D6E5F2]">

                </div>
              </div>

              {/* 分析周期选择 */}

                <span className="text-sm text-gray-500 mr-2">分析周期:</span>
                {['7d', '30d', 'month', 'custom'].map(p => (
                  <button

                ))}
              </div>

              {/* 筛选区 */}
              <div className="flex items-center gap-4 mt-4 py-3 border-t border-gray-100">
                <select 
                  className="px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-primary"
                  value={filters.warehouse}
                  onChange={(e) => setFilters({...filters, warehouse: e.target.value})}
                >
                  <option>全部区域仓</option>
                  <option>兰州一区区域仓</option>
                  <option>兰州二区区域仓</option>

                </select>
                <select 
                  className="px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-primary"

                >

                      </div>
                      <div className="flex items-center gap-4 text-xs text-gray-500">
                        <span>采纳率: <span className="text-accent font-medium">{item.adoption}%</span></span>
                        <span>修正率: <span className="text-accent font-medium">{item.correction}%</span></span>
                      </div>
                    </div>
                  ))}
                </div>

                {/* Top未采纳建议 */}
                <h4 className="text-sm font-medium text-gray-900 mt-5 mb-3">Top未采纳建议</h4>
                <div className="space-y-2">
                  {mockData.topUnadopted.map((item, idx) => (
                    <div key={idx} className="flex items-center justify-between p-2 bg-gray-50 rounded-lg">
                      <div>
                        <div className="text-sm text-gray-900">{item.id}</div>
                        <div className="text-xs text-gray-500">{item.reason}</div>
                      </div>
                      <span className="text-xs text-gray-400">{item.strategy}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
