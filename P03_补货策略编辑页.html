<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>补货策略编辑页 - P03</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6C9BCA',
            'primary-hover': '#5A8AB9',
            'primary-light': '#E8F1F8',
            success: '#53B886',
            warning: '#F9A633',
            danger: '#C45C4A',
            info: '#6C9BCA',
            'text-main': '#1F2937',
            'text-sub': '#6B7280',
            border: '#E5E7EB',
            bg: '#F9FAFB',
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #f0f7fc 100%);
      min-height: 100vh;
    }
    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #1F2937;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #E5E7EB;
    }
    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
      display: block;
    }
    .form-input {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #6C9BCA;
      box-shadow: 0 0 0 3px rgba(108, 155, 202, 0.15);
    }
    .form-select {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      font-size: 14px;
      background: white;
      cursor: pointer;
    }
    .mode-card {
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-card:hover {
      border-color: #6C9BCA;
    }
    .mode-card.active {
      border-color: #6C9BCA;
      background: #E8F1F8;
    }
    .param-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .param-label {
      width: 120px;
      font-size: 13px;
      color: #374151;
      flex-shrink: 0;
    }
    .param-input {
      flex: 1;
      max-width: 160px;
    }
    .param-hint {
      color: #9CA3AF;
      font-size: 12px;
    }
    .info-card {
      background: #F9FAFB;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .info-card-title {
      font-size: 13px;
      font-weight: 600;
      color: #6C9BCA;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .calculation-box {
      background: linear-gradient(135deg, #E8F1F8 0%, #F0F7FC 100%);
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
    }
    .calc-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px dashed rgba(108, 155, 202, 0.25);
    }
    .calc-row:last-child {
      border-bottom: none;
    }
    .calc-label {
      color: #6B7280;
      font-size: 13px;
    }
    .calc-value {
      font-weight: 600;
      color: #1F2937;
    }
    .calc-result {
      background: #6C9BCA;
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      font-weight: 600;
    }
    .alert-box {
      background: #FEF3C7;
      border: 1px solid #FCD34D;
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 16px;
    }
    .alert-box.danger {
      background: #FEE2E2;
      border-color: #FCA5A5;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-draft {
      background: #F3F4F6;
      color: #6B7280;
    }
    .badge-active {
      background: #E8F5EE;
      color: #53B886;
    }
    .tooltip {
      position: relative;
      display: inline-block;
      cursor: help;
    }
    .tooltip:hover .tooltip-text {
      visibility: visible;
      opacity: 1;
    }
    .tooltip-text {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      background: #1F2937;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
      z-index: 100;
      transition: opacity 0.2s;
    }
    .tooltip-text::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: #1F2937 transparent transparent transparent;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Mock数据
    const mockData = {
      strategy: {
        id: 'STR-20260408-001',
        name: '兰州一区碳酸饮料补货策略',
        status: 'draft',
        version: 'V1',
        lastModifier: '张计划',
        lastModifiedTime: '2026-04-08 14:30:00',
      },
      sampleSKUs: [
        { id: 1, code: 'SKU-001', name: '可乐500ml', avgDailySale: 120, currentStock: 800, inTransit: 200, supplierLeadTime: 3 },
        { id: 2, code: 'SKU-002', name: '雪碧500ml', avgDailySale: 95, currentStock: 650, inTransit: 150, supplierLeadTime: 3 },
        { id: 3, code: 'SKU-003', name: '芬达橙味500ml', avgDailySale: 60, currentStock: 420, inTransit: 100, supplierLeadTime: 2 },
      ],
      warehouses: ['兰州一区区域仓', '兰州二区区域仓', '西宁区域仓'],
      categories: ['碳酸饮料', '果汁饮料', '茶饮料', '功能饮料'],
    };

    // 补货模式选项
    const replenishmentModes = [
      {
        key: 'quantity',
        name: '定量补货',
        desc: '库存降到阈值就补',
        detail: '当库存降至补货点时，系统触发补货建议',
      },
      {
        key: 'period',
        name: '定时补货',
        desc: '到固定周期统一补',
        detail: '按固定周期（如每周一）统一生成补货建议',
      },
      {
        key: 'manual',
        name: '手工补货',
        desc: '系统不自动算量，人工主导',
        detail: '完全由人工决策补货时间和数量',
      },
    ];

    function App() {
      // 表单状态
      const [formData, setFormData] = useState({
        strategyName: mockData.strategy.name,
        strategyLevel: 'category',
        description: '',
        warehouse: '兰州一区区域仓',
        category: '碳酸饮料',
        sku: '',
        mode: 'quantity',
        purchaseLeadTime: 3,
        safetyDays: 2,
        targetCoverageDays: 7,
        replenishmentCycle: 7,
        moq: 100,
        packageMultiple: 24,
        enableTransferPriority: false,
      });

      // UI状态
      const [activeSections, setActiveSections] = useState({
        basic: true,
        scope: true,
        mode: true,
        params: true,
        advanced: false,
      });

      const [selectedSKU, setSelectedSKU] = useState(mockData.sampleSKUs[0]);
      const [showCalculation, setShowCalculation] = useState(false);
      const [calculationResult, setCalculationResult] = useState(null);

      // 切换折叠区域
      const toggleSection = (section) => {
        setActiveSections(prev => ({ ...prev, [section]: !prev[section] }));
      };

      // 更新表单数据
      const updateForm = (key, value) => {
        setFormData(prev => ({ ...prev, [key]: value }));
        // 参数变化时重置试算结果
        if (['purchaseLeadTime', 'safetyDays', 'targetCoverageDays', 'moq', 'packageMultiple'].includes(key)) {
          setShowCalculation(false);
        }
      };

      // 执行试算
      const calculate = () => {
        const avgDailySale = selectedSKU.avgDailySale;
        const currentStock = selectedSKU.currentStock;
        const inTransit = selectedSKU.inTransit;
        const leadTime = parseInt(formData.purchaseLeadTime) || 0;
        const safetyDays = parseInt(formData.safetyDays) || 0;
        const targetDays = parseInt(formData.targetCoverageDays) || 0;
        const moq = parseInt(formData.moq) || 1;
        const packageMultiple = parseInt(formData.packageMultiple) || 1;

        // 计算逻辑
        const safetyStock = avgDailySale * safetyDays;
        const targetLevel = avgDailySale * (targetDays + leadTime) + safetyStock;
        const netStock = currentStock + inTransit;
        const suggestedQty = Math.max(0, targetLevel - netStock);
        const finalQty = Math.ceil(Math.max(suggestedQty, moq) / packageMultiple) * packageMultiple;
        const replenishmentPoint = safetyStock + avgDailySale * leadTime;

        setCalculationResult({
          safetyStock,
          targetLevel,
          netStock,
          suggestedQty,
          finalQty,
          replenishmentPoint,
          stockDays: Math.floor(netStock / avgDailySale),
        });
        setShowCalculation(true);
      };

      // 生成策略说明文案
      const getStrategyDescription = () => {
        const levelMap = {
          warehouse: '仓库策略',
          category: '品类策略',
          sku: 'SKU策略',
        };
        const modeMap = {
          quantity: '定量补货',
          period: '定时补货',
          manual: '手工补货',
        };
        return `本策略适用于${formData.warehouse}下的${formData.category}品类，按${modeMap[formData.mode]}模式执行补货。`;
      };

      // 获取公式说明
      const getFormulaDescription = () => {
        if (formData.mode === 'quantity') {
          return {
            business: '系统会先判断当前库存还能支撑几天，再结合采购交期和安全库存计算建议量。',
            formula: '目标水位 = 日均销量 × (目标覆盖天数 + 采购交期) + 安全库存',
          };
        } else if (formData.mode === 'period') {
          return {
            business: '系统按固定周期检查库存，计算需要补充到目标水位的数量。',
            formula: '建议量 = 目标水位 - 当前库存 - 在途库存',
          };
        }
        return { business: '人工主导补货决策', formula: '无自动计算公式' };
      };

      return (
        <div className="min-h-screen pb-24">
          {/* 顶部信息区 */}
          <div className="bg-white border-b border-gray-200 sticky top-0 z-50">
            <div className="max-w-[1600px] mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <button className="text-gray-500 hover:text-gray-700">
                    <i className="fas fa-arrow-left"></i>
                  </button>
                  <div>
                    <h1 className="text-xl font-semibold text-gray-900">补货策略编辑页</h1>
                    <div className="flex items-center gap-3 mt-1">
                      <span className="badge badge-draft">
                        <i className="fas fa-circle text-[8px] mr-1"></i>
                        草稿
                      </span>
                      <span className="text-sm text-gray-500">版本: {mockData.strategy.version}</span>
                      <span className="text-sm text-gray-400">|</span>
                      <span className="text-sm text-gray-500">最近修改: {mockData.strategy.lastModifier} · {mockData.strategy.lastModifiedTime}</span>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <button className="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">
                    返回列表
                  </button>
                  <button className="px-4 py-2 text-sm font-medium text-primary bg-primary-light rounded-lg hover:bg-[#D6E5F2]">
                    保存草稿
                  </button>
                  <button className="px-4 py-2 text-sm font-medium text-white bg-primary rounded-lg hover:bg-primary-hover">
                    保存并启用
                  </button>
                </div>
              </div>
            </div>
          </div>

          {/* 主内容区 */}
          <div className="max-w-[1600px] mx-auto px-6 py-6">
            <div className="grid grid-cols-12 gap-6">
              {/* 左侧配置区 */}
              <div className="col-span-7 space-y-4">
                {/* 基础信息 */}
                <div className="card p-5">
                  <div 
                    className="section-title flex items-center justify-between cursor-pointer"
                    onClick={() => toggleSection('basic')}
                  >
                    <span>1. 基础信息</span>
                    <i className={`fas fa-chevron-${activeSections.basic ? 'up' : 'down'} text-gray-400`}></i>
                  </div>
                  {activeSections.basic && (
                    <div className="space-y-4">
                      <div>
                        <label className="form-label">策略名称 <span className="text-danger">*</span></label>
                        <input 
                          type="text" 
                          className="form-input"
                          value={formData.strategyName}
                          onChange={(e) => updateForm('strategyName', e.target.value)}
                          placeholder="请输入策略名称"
                        />
                      </div>
                      <div>
                        <label className="form-label">策略层级 <span className="text-danger">*</span></label>
                        <select 
                          className="form-select"
                          value={formData.strategyLevel}
                          onChange={(e) => updateForm('strategyLevel', e.target.value)}
                        >
                          <option value="warehouse">仓库策略</option>
                          <option value="category">品类策略</option>
                          <option value="sku">SKU策略</option>
                        </select>
                        {formData.strategyLevel === 'sku' && (
                          <p className="text-xs text-warning mt-2">
                            <i className="fas fa-exclamation-triangle mr-1"></i>
                            该策略优先级最高，将覆盖同范围下的品类策略和仓库策略
                          </p>
                        )}
                      </div>
                      <div>
                        <label className="form-label">策略说明</label>
                        <textarea 
                          className="form-input h-20 py-2 resize-none"
                          placeholder="请输入策略说明，帮助其他用户理解"
                          value={formData.description}
                          onChange={(e) => updateForm('description', e.target.value)}
                        />
                      </div>
                    </div>
                  )}
                </div>

                {/* 适用范围 */}
                <div className="card p-5">
                  <div 
                    className="section-title flex items-center justify-between cursor-pointer"
                    onClick={() => toggleSection('scope')}
                  >
                    <span>2. 适用范围</span>
                    <i className={`fas fa-chevron-${activeSections.scope ? 'up' : 'down'} text-gray-400`}></i>
                  </div>
                  {activeSections.scope && (
                    <div className="space-y-4">
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="form-label">区域仓 <span className="text-danger">*</span></label>
                          <select 
                            className="form-select"
                            value={formData.warehouse}
                            onChange={(e) => updateForm('warehouse', e.target.value)}
                          >
                            {mockData.warehouses.map(w => <option key={w} value={w}>{w}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="form-label">品类 <span className="text-danger">*</span></label>
                          <select 
                            className="form-select"
                            value={formData.category}
                            onChange={(e) => updateForm('category', e.target.value)}
                          >
                            {mockData.categories.map(c => <option key={c} value={c}>{c}</option>)}
                          </select>
                        </div>
                      </div>
                      {formData.strategyLevel === 'sku' && (
                        <div>
                          <label className="form-label">SKU选择</label>
                          <select className="form-select">
                            <option>请选择SKU</option>
                            {mockData.sampleSKUs.map(sku => (
                              <option key={sku.id} value={sku.code}>{sku.code} - {sku.name}</option>
                            ))}
                          </select>
                        </div>
                      )}
                      <div className="alert-box">
                        <i className="fas fa-info-circle text-warning"></i>
                        <div className="text-sm text-gray-700">
                          本次变更可能影响 <strong>1个区域仓</strong> / <strong>约50个SKU</strong>
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                {/* 补货模式选择 */}
                <div className="card p-5">
                  <div 
                    className="section-title flex items-center justify-between cursor-pointer"
                    onClick={() => toggleSection('mode')}
                  >
                    <span>3. 补货模式选择</span>
                    <i className={`fas fa-chevron-${activeSections.mode ? 'up' : 'down'} text-gray-400`}></i>
                  </div>
                  {activeSections.mode && (
                    <div className="grid grid-cols-3 gap-4">
                      {replenishmentModes.map(mode => (
                        <div 
                          key={mode.key}
                          className={`mode-card ${formData.mode === mode.key ? 'active' : ''}`}
                          onClick={() => updateForm('mode', mode.key)}
                        >
                          <div className="flex items-center gap-2 mb-2">
                            <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center ${
                              formData.mode === mode.key ? 'border-primary' : 'border-gray-300'
                            }`}>
                              {formData.mode === mode.key && <div className="w-2 h-2 rounded-full bg-primary"></div>}
                            </div>
                            <span className="font-medium text-gray-900">{mode.name}</span>
                          </div>
                          <p className="text-sm text-[#5A8AB9] font-medium">{mode.desc}</p>
                          <p className="text-xs text-gray-500 mt-2">{mode.detail}</p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* 参数配置 */}
                {formData.mode !== 'manual' && (
                  <div className="card p-5">
                    <div 
                      className="section-title flex items-center justify-between cursor-pointer"
                      onClick={() => toggleSection('params')}
                    >
                      <span>4. 参数配置</span>
                      <i className={`fas fa-chevron-${activeSections.params ? 'up' : 'down'} text-gray-400`}></i>
                    </div>
                    {activeSections.params && (
                      <div className="space-y-2">
                        <div className="param-item">
                          <label className="param-label">
                            采购交期
                            <span className="tooltip ml-1">
                              <i className="fas fa-question-circle text-gray-400"></i>
                              <span className="tooltip-text">从下单到入库所需天数</span>
                            </span>
                          </label>
                          <input 
                            type="number" 
                            className="form-input param-input"
                            value={formData.purchaseLeadTime}
                            onChange={(e) => updateForm('purchaseLeadTime', e.target.value)}
                          />
                          <span className="param-hint">天</span>
                        </div>
                        <div className="param-item">
                          <label className="param-label">
                            安全天数
                            <span className="tooltip ml-1">
                              <i className="fas fa-question-circle text-gray-400"></i>
                              <span className="tooltip-text">为应对销量波动额外预留的天数</span>
                            </span>
                          </label>
                          <input 
                            type="number" 
                            className="form-input param-input"
                            value={formData.safetyDays}
                            onChange={(e) => updateForm('safetyDays', e.target.value)}
                          />
                          <span className="param-hint">天 · 值越大，建议补货量通常越高</span>
                        </div>
                        {formData.mode === 'quantity' && (
                          <div className="param-item">
                            <label className="param-label">
                              目标覆盖天数
                              <span className="tooltip ml-1">
                                <i className="fas fa-question-circle text-gray-400"></i>
                                <span className="tooltip-text">补货后希望覆盖的销售天数</span>
                              </span>
                            </label>
                            <input 
                              type="number" 
                              className="form-input param-input"
                              value={formData.targetCoverageDays}
                              onChange={(e) => updateForm('targetCoverageDays', e.target.value)}
                            />
                            <span className="param-hint">天</span>
                          </div>
                        )}
                        {formData.mode === 'period' && (
                          <div className="param-item">
                            <label className="param-label">
                              补货周期
                              <span className="tooltip ml-1">
                                <i className="fas fa-question-circle text-gray-400"></i>
                                <span className="tooltip-text">固定补货间隔天数</span>
                              </span>
                            </label>
                            <input 
                              type="number" 
                              className="form-input param-input"
                              value={formData.replenishmentCycle}
                              onChange={(e) => updateForm('replenishmentCycle', e.target.value)}
                            />
                            <span className="param-hint">天 · 值越大，单次补货量越大</span>
                          </div>
                        )}
                        <div className="param-item">
                          <label className="param-label">
                            最小起订量(MOQ)
                          </label>
                          <input 
                            type="number" 
                            className="form-input param-input"
                            value={formData.moq}
                            onChange={(e) => updateForm('moq', e.target.value)}
                          />
                          <span className="param-hint">件</span>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* 高级设置 */}
                <div className="card p-5">
                  <div 
                    className="section-title flex items-center justify-between cursor-pointer"
                    onClick={() => toggleSection('advanced')}
                  >
                    <span>5. 高级设置</span>
                    <i className={`fas fa-chevron-${activeSections.advanced ? 'up' : 'down'} text-gray-400`}></i>
                  </div>
                  {activeSections.advanced && (
                    <div className="space-y-4">
                      <div className="param-item">
                        <label className="param-label">包装倍数</label>
                        <input 
                          type="number" 
                          className="form-input param-input"
                          value={formData.packageMultiple}
                          onChange={(e) => updateForm('packageMultiple', e.target.value)}
                        />
                        <span className="param-hint">件 · 按整箱/整托补货</span>
                      </div>
                      <div className="flex items-center gap-3">
                        <input 
                          type="checkbox" 
                          id="transferPriority"
                          checked={formData.enableTransferPriority}
                          onChange={(e) => updateForm('enableTransferPriority', e.target.checked)}
                          className="w-4 h-4 text-primary rounded"
                        />
                        <label htmlFor="transferPriority" className="text-sm text-gray-700">
                          开启调拨优先
                          <span className="tooltip ml-1">
                            <i className="fas fa-question-circle text-gray-400"></i>
                            <span className="tooltip-text">系统会先寻找其他供给节点余量</span>
                          </span>
                        </label>
                      </div>
                      {formData.enableTransferPriority && (
                        <p className="text-xs text-[#C17A28]">
                          <i className="fas fa-exclamation-triangle mr-1"></i>
                          开启后，系统会优先从其他仓库调拨，而非直接采购
                        </p>
                      )}
                    </div>
                  )}
                </div>
              </div>

              {/* 右侧解释与试算区 */}
              <div className="col-span-5 space-y-4">
                {/* 策略说明卡 */}
                <div className="card p-5">
                  <div className="info-card-title">
                    <i className="fas fa-file-alt"></i>
                    策略说明
                  </div>
                  <p className="text-sm text-gray-600 leading-relaxed">
                    {getStrategyDescription()}
                  </p>
                </div>

                {/* 公式说明卡 */}
                {formData.mode !== 'manual' && (
                  <div className="card p-5">
                    <div className="info-card-title">
                      <i className="fas fa-calculator"></i>
                      公式说明
                    </div>
                    <div className="space-y-3">
                      <p className="text-sm text-gray-600">
                        {getFormulaDescription().business}
                      </p>
                      <div className="bg-primary-light rounded-lg p-3">
                        <p className="text-sm font-mono text-primary">
                          {getFormulaDescription().formula}
                        </p>
                      </div>
                    </div>
                  </div>
                )}

                {/* 业务解释卡 */}
                {formData.mode !== 'manual' && (
                  <div className="card p-5">
                    <div className="info-card-title">
                      <i className="fas fa-lightbulb"></i>
                      参数影响说明
                    </div>
                    <div className="space-y-2 text-sm">
                      <div className="flex items-start gap-2">
                        <span className="text-[#5A8AB9] font-medium">安全天数:</span>
                        <span className="text-gray-600">值越大，补货越保守，缺货风险下降，但库存占用上升</span>
                      </div>
                      {formData.mode === 'period' && (
                        <div className="flex items-start gap-2">
                          <span className="text-[#5A8AB9] font-medium">补货周期:</span>
                          <span className="text-gray-600">值越大，补货频次下降，单次补货量增大</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* 样例SKU试算卡 */}
                {formData.mode !== 'manual' && (
                  <div className="card p-5">
                    <div className="info-card-title">
                      <i className="fas fa-flask"></i>
                      样例SKU试算
                    </div>
                    <div className="space-y-4">
                      <div>
                        <label className="form-label">选择样例SKU</label>
                        <select 
                          className="form-select"
                          value={selectedSKU.id}
                          onChange={(e) => {
                            const sku = mockData.sampleSKUs.find(s => s.id === parseInt(e.target.value));
                            setSelectedSKU(sku);
                            setShowCalculation(false);
                          }}
                        >
                          {mockData.sampleSKUs.map(sku => (
                            <option key={sku.id} value={sku.id}>
                              {sku.code} - {sku.name}
                            </option>
                          ))}
                        </select>
                      </div>

                      <div className="bg-gray-50 rounded-lg p-3 text-sm">
                        <div className="grid grid-cols-2 gap-2">
                          <div><span className="text-gray-500">日均销量:</span> <span className="font-medium">{selectedSKU.avgDailySale}件</span></div>
                          <div><span className="text-gray-500">当前库存:</span> <span className="font-medium">{selectedSKU.currentStock}件</span></div>
                          <div><span className="text-gray-500">在途库存:</span> <span className="font-medium">{selectedSKU.inTransit}件</span></div>
                          <div><span className="text-gray-500">采购交期:</span> <span className="font-medium">{selectedSKU.supplierLeadTime}天</span></div>
                        </div>
                      </div>

                      <button 
                        onClick={calculate}
                        className="w-full py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary-hover transition-colors"
                      >
                        <i className="fas fa-play-circle mr-2"></i>
                        执行试算
                      </button>

                      {showCalculation && calculationResult && (
                        <div className="calculation-box">
                          <h4 className="font-semibold text-gray-900 mb-3">试算结果</h4>
                          <div className="calc-row">
                            <span className="calc-label">安全库存</span>
                            <span className="calc-value">{calculationResult.safetyStock} 件</span>
                          </div>
                          <div className="calc-row">
                            <span className="calc-label">补货点</span>
                            <span className="calc-value">{calculationResult.replenishmentPoint} 件</span>
                          </div>
                          <div className="calc-row">
                            <span className="calc-label">目标水位</span>
                            <span className="calc-value">{calculationResult.targetLevel} 件</span>
                          </div>
                          <div className="calc-row">
                            <span className="calc-label">当前可用库存</span>
                            <span className="calc-value">{calculationResult.netStock} 件</span>
                          </div>
                          <div className="calc-row">
                            <span className="calc-label">原始建议量</span>
                            <span className="calc-value">{calculationResult.suggestedQty} 件</span>
                          </div>
                          <div className="calc-row pt-2 mt-2 border-t border-[#B8D4EB]">
                            <span className="text-primary font-semibold">最终建议补货量</span>
                            <span className="calc-result">{calculationResult.finalQty} 件</span>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* 覆盖/冲突提醒卡 */}
                <div className="card p-5">
                  <div className="info-card-title">
                    <i className="fas fa-shield-alt"></i>
                    覆盖与冲突提醒
                  </div>
                  <div className="space-y-3">
                    <div className="flex items-center justify-between text-sm">
                      <span className="text-gray-600">当前策略优先级</span>
                      <span className="badge bg-primary-light text-primary">中</span>
                    </div>
                    <div className="alert-box danger">
                      <i className="fas fa-exclamation-triangle text-danger"></i>
                      <div className="text-sm text-gray-700">
                        <strong>冲突提醒:</strong> 当前SKU已存在一条启用中的SKU策略，保存将覆盖原有策略
                      </div>
                    </div>
                    <div className="bg-gray-50 rounded-lg p-3 text-sm">
                      <p className="text-gray-600 mb-2">可能被覆盖的策略:</p>
                      <ul className="space-y-1 text-gray-500">
                        <li>• 兰州一区通用补货策略 (品类策略)</li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* 底部操作区 */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-4 z-50">
            <div className="max-w-[1600px] mx-auto flex items-center justify-between">
              <div className="text-sm text-gray-500">
                {!showCalculation && formData.mode !== 'manual' && (
                  <span className="text-[#F9A633]">
                    <i className="fas fa-exclamation-circle mr-1"></i>
                    你已修改关键参数，建议先完成一次样例试算再启用
                  </span>
                )}
              </div>
              <div className="flex items-center gap-3">
                <button className="px-5 py-2.5 text-sm font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">
                  取消
                </button>
                <button className="px-5 py-2.5 text-sm font-medium text-primary bg-primary-light rounded-lg hover:bg-[#D6E5F2]">
                  <i className="fas fa-save mr-2"></i>
                  保存草稿
                </button>
                <button 
                  onClick={calculate}
                  className="px-5 py-2.5 text-sm font-medium text-info bg-blue-50 rounded-lg hover:bg-blue-100"
                >
                  <i className="fas fa-sync-alt mr-2"></i>
                  试算刷新
                </button>
                <button className="px-5 py-2.5 text-sm font-medium text-white bg-primary rounded-lg hover:bg-primary-hover">
                  <i className="fas fa-check-circle mr-2"></i>
                  保存并启用
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
